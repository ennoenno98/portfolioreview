# ---------------------------------------------------------------------------
# Vanatari portfolio rules - the operating system for the monthly review.
# Every SKU x market gets exactly one verdict. Deterministic, ordered checks:
# the FIRST rule that matches wins. Change thresholds here, rerun classify.py,
# and the whole review (app + monthly pack) follows.
# ---------------------------------------------------------------------------

review:
  min_months_data: 3        # fewer active months -> "No data" state (no verdict)
  incubation_months: 6      # age <= this -> "New" tag: shielded from Fix/Exit
  trend_window_months: 3    # sales trend = last 3m vs prior 3m
  margin_window_months: 6   # CM gates evaluated on the trailing 6 months

thresholds:
  fix_gap_pp: 5.0           # CM3% below country target by more than this -> broken
  scale_growth_pct: 10.0    # 3m sales growth needed for Scale when not already top tier
  decline_pct: -10.0        # 3m sales decline that marks a product as slipping
  improving_pp: 2.0         # CM3% improvement (3m vs prior 3m) that counts as "improving"
  exit_neg_months: 3        # months with CM3 < 0 within the margin window -> Exit
  stall_min_ttm_sales: 500  # EUR TTM; below this a silent SKU is noise, not a stall
  discontinue_below_ttm: 15000  # EUR TTM; a whole product below this -> Exit
                                # (channel level only; New launches + growers spared)

# Five verdicts, each a distinct budget decision (engine mirrors this order).
verdicts:
  Scale: >
    At or above CM3% target with top-tier volume or strong growth.
    Invest: budget, inventory, variations, new markets.
  Defend: >
    Hold / maintain. At or around target with no trigger to act - includes top
    sellers with flat/negative momentum (protect share) and the healthy middle
    that needs nothing this month.
  Fix: >
    CM3% more than fix_gap_pp below the country target (or negative) but worth
    saving - high volume tier or improving. Actions: price, fees, COGS, ad
    efficiency. Also healthy SKUs with stalled supply.
  Harvest: >
    Profitable but below target, bottom volume tier, flat or declining.
    Keep selling, cut ads to maintenance, no aggressive restock.
  Exit: >
    CM3 negative in >= exit_neg_months of the margin window, margin not improving.
    Delist / liquidate in this market. (Top-volume losers get one Fix cycle first.)

# States and tags (NOT verdicts - shown separately in the review)
states:
  New: >
    Age <= incubation_months. Still gets a verdict, but is shielded from Fix/Exit
    (held as Defend while it ramps) and flagged "New" so we protect the launch.
  No data: >
    Fewer than min_months_data active months, or no margin data. No verdict -
    listed in the data-gaps panel.
